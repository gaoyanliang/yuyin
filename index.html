<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>讯飞语音输入助手 - 实时语音转文字</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #f6f9fc 0%, #eef2f7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
            padding: 1.5rem;
        }
        .card {
            max-width: 780px;
            width: 100%;
            background: rgba(255,255,255,0.96);
            border-radius: 2.5rem;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.2);
            overflow: hidden;
            backdrop-filter: blur(2px);
        }
        .card-inner {
            padding: 2rem 2rem 2.2rem;
        }
        .header {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #15803d, #166534);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .sub {
            color: #5a6a7c;
            margin-top: 8px;
            font-size: 0.85rem;
        }
        .result-container {
            background: #f8fafc;
            border-radius: 1.8rem;
            margin: 1.8rem 0;
            border: 1px solid #e2e8f0;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02), 0 2px 5px rgba(0,0,0,0.02);
        }
        .result-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 1.5rem 0.2rem 1.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #4a6a8a;
            letter-spacing: 1px;
        }
        .clear-btn {
            background: transparent;
            border: none;
            color: #6c8aa8;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .clear-btn:hover {
            background: #e9eef3;
            color: #1e293b;
        }
        .result-text {
            padding: 0.2rem 1.5rem 1.6rem 1.5rem;
            min-height: 170px;
        }
        .result-text p {
            font-size: 1.25rem;
            line-height: 1.5;
            font-weight: 500;
            color: #0f172a;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .placeholder-text {
            opacity: 0.55;
            font-weight: 400;
            font-size: 1rem;
            color: #5f7ea0;
        }
        .status-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f1f5f9;
            border-radius: 100px;
            padding: 0.7rem 1.2rem;
            margin: 1.2rem 0 1.5rem;
            font-size: 0.85rem;
            flex-wrap: wrap;
            gap: 10px;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        .status-led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #94a3b8;
            transition: all 0.2s;
        }
        .status-led.recording {
            background: #ef4444;
            box-shadow: 0 0 6px #ef4444;
            animation: pulse 1s infinite;
        }
        .status-led.active {
            background: #3b82f6;
            box-shadow: 0 0 5px #3b82f6;
        }
        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1);}
        }
        .status-message {
            color: #334155;
            text-align: right;
            flex: 1;
        }
        .button-wrapper {
            display: flex;
            justify-content: center;
        }
        .voice-btn {
            background: linear-gradient(105deg, #1e3a5f, #0f2b44);
            border: none;
            padding: 1rem 2.2rem;
            border-radius: 60px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 10px 18px -8px rgba(0,0,0,0.3);
        }
        .voice-btn:active {
            transform: scale(0.97);
        }
        .voice-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .info-tips {
            margin-top: 2rem;
            font-size: 0.7rem;
            text-align: center;
            color: #6d7f91;
            border-top: 1px solid #e2edf2;
            padding-top: 1.2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .info-tips span {
            background: #eff3f8;
            padding: 4px 12px;
            border-radius: 50px;
        }
        @media (max-width: 550px) {
            .card-inner { padding: 1.2rem; }
            .result-text p { font-size: 1rem; }
            .voice-btn { padding: 0.8rem 1.4rem; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-inner">
        <div class="header">
            <h1>🎙️ 讯飞语音输入</h1>
            <div class="sub">实时流式转写 · 边说边出字</div>
        </div>

        <div class="result-container">
            <div class="result-label">
                <span>📝 识别结果</span>
                <button class="clear-btn" id="clearTextBtn">✖ 清空</button>
            </div>
            <div class="result-text" id="resultDisplay">
                <p id="transcriptParagraph" class="placeholder-text">✨ 点击下方麦克风按钮，允许麦克风后开始语音输入</p>
            </div>
        </div>

        <div class="status-area">
            <div class="status-badge">
                <div class="status-led" id="statusLed"></div>
                <span id="statusLabel">待机</span>
            </div>
            <div class="status-message" id="statusMessage">就绪，点击🎤开始语音转写</div>
        </div>

        <div class="button-wrapper">
            <button class="voice-btn" id="voiceRecogBtn">
                <span class="voice-icon">🎤</span>
                <span id="btnText">开始语音输入</span>
            </button>
        </div>

        <div class="info-tips">
            <span>⚡ 讯飞流式版WebAPI (边录边识)</span>
            <span>🔒 需HTTPS环境 / localhost</span>
            <span>📱 推荐Chrome/Edge浏览器</span>
        </div>
    </div>
</div>

<script>
    // ======================== 讯飞语音听写 (流式版WebAPI) 完整实现 ========================
    // 使用前请务必替换为你在讯飞官网申请的真实参数（需绑定服务器IP地址）
    const APP_ID = 'dbeaf184';          // 替换为你的 appid
    const API_KEY = '773b22df8ecfe6edbe3c7ff5a3340513';        // 替换为你的 APIKey
    const API_SECRET = 'ZTYyY2Q4MTllZTcyODNiYWM1MDc5ZDA1';  // 替换为你的 APISecret
    
    // ----- 以下音频参数使用16k采样率、16bit pcm (与sms16k引擎匹配) -----
    const SAMPLE_RATE = 16000;             // 16kHz
    const CHANNELS = 1;                    // 单声道
    const CHUNK_DURATION_MS = 40;          // 每40ms发送一次，平衡实时性与流畅度
    const BUFFER_SIZE = SAMPLE_RATE * CHUNK_DURATION_MS / 1000;  // 每次采样点数 (640)
    
    // DOM 元素
    const voiceBtn = document.getElementById('voiceRecogBtn');
    const btnTextSpan = document.getElementById('btnText');
    const transcriptP = document.getElementById('transcriptParagraph');
    const statusLed = document.getElementById('statusLed');
    const statusLabelSpan = document.getElementById('statusLabel');
    const statusMessageSpan = document.getElementById('statusMessage');
    const clearBtn = document.getElementById('clearTextBtn');
    
    // 状态变量
    let mediaStream = null;            // 麦克风流
    let audioContext = null;           // AudioContext
    let sourceNode = null;             // MediaStreamSource
    let processorNode = null;          // ScriptProcessorNode
    let socket = null;                 // WebSocket连接
    let isRecording = false;           // 录音/识别中标志
    let finalTranscript = '';          // 最终已确认的文本
    let audioBufferQueue = [];          // 待发送音频块队列
    let sendingAudio = false;           // 是否正在发送音频块
    
    // 辅助函数: 更新界面文本
    function updateTranscriptUI(text, isPlaceholder = false) {
        if (!transcriptP) return;
        const cleanText = text && text.trim() !== '' ? text : '';
        if (cleanText === '') {
            if (isPlaceholder && finalTranscript === '') {
                transcriptP.innerHTML = '✨ 点击下方麦克风按钮，允许麦克风后开始语音输入';
                transcriptP.classList.add('placeholder-text');
            } else if (finalTranscript === '') {
                transcriptP.innerHTML = '✨ 点击麦克风开始语音输入';
                transcriptP.classList.add('placeholder-text');
            } else {
                transcriptP.innerHTML = escapeHtml(finalTranscript);
                transcriptP.classList.remove('placeholder-text');
            }
            return;
        }
        transcriptP.innerHTML = escapeHtml(cleanText);
        transcriptP.classList.remove('placeholder-text');
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // 更新状态指示器
    function updateUIStatus(isActive, message, isError = false) {
        if (isActive) { // 录音中/识别中
            statusLed.classList.remove('error-led');
            statusLed.classList.add('recording');
            statusLabelSpan.innerText = '识别中';
        } else if (isError) {
            statusLed.classList.remove('recording', 'active');
            statusLed.classList.add('error-led');
            statusLabelSpan.innerText = '异常';
        } else {
            statusLed.classList.remove('recording', 'error-led', 'active');
            statusLabelSpan.innerText = '待机';
        }
        statusMessageSpan.innerText = message || (isActive ? '🎙️ 识别中，请说话...' : '准备就绪');
    }
    
    // 清除识别结果
    function clearTranscript() {
        finalTranscript = '';
        updateTranscriptUI('', true);
        statusMessageSpan.innerText = '内容已清空，可开始新语音';
    }
    
    // 关闭WebSocket连接，清理音频资源
    async function closeEverything() {
        // 关闭WebSocket
        if (socket && socket.readyState === WebSocket.OPEN) {
            try {
                // 发送结束帧
                const endMsg = JSON.stringify({end: true});
                socket.send(endMsg);
            } catch(e) {}
            setTimeout(() => {
                if (socket) socket.close();
            }, 100);
            socket = null;
        }
        // 停止音频抓取
        if (processorNode) {
            processorNode.disconnect();
            processorNode = null;
        }
        if (sourceNode) {
            sourceNode.disconnect();
            sourceNode = null;
        }
        if (audioContext) {
            await audioContext.close();
            audioContext = null;
        }
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => track.stop());
            mediaStream = null;
        }
        isRecording = false;
        sendingAudio = false;
        voiceBtn.disabled = false;
        btnTextSpan.innerText = '开始语音输入';
        updateUIStatus(false, '识别已结束', false);
    }
    
    // ========== 讯飞签名生成 (WebSocket鉴权) ==========
    // 根据官方要求, 通过 HMAC-SHA256 生成 Authorization 头.
    async function buildWebSocketUrl() {
        const host = 'iat-api.xfyun.cn';
        const path = '/v2/iat';
        const apiKey = API_KEY;
        const apiSecret = API_SECRET;
        const date = new Date().toUTCString();
        const signatureOrigin = `host: ${host}\ndate: ${date}\nGET ${path} HTTP/1.1`;
        
        // 使用 CryptoJS (需要提前引入库, 这里原生实现通过 Web Crypto)
        // 由于官方推荐 CryptoJS 比较方便, 但为了纯原生实现, 我们使用 web crypto API
        // 但为了安全简单，手动引入一个轻量 HMAC 函数
        async function hmacSha256(key, message) {
            const encKey = new TextEncoder().encode(key);
            const encMsg = new TextEncoder().encode(message);
            const cryptoKey = await crypto.subtle.importKey('raw', encKey, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
            const signature = await crypto.subtle.sign('HMAC', cryptoKey, encMsg);
            return btoa(String.fromCharCode(...new Uint8Array(signature)));
        }
        
        const signature = await hmacSha256(apiSecret, signatureOrigin);
        const authorization = `api_key="${apiKey}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
        const encodedAuth = btoa(authorization);
        const url = `wss://${host}${path}?authorization=${encodedAuth}&date=${encodeURIComponent(date)}&host=${host}`;
        return url;
    }
    
    // 发送音频数据块队列 (保证顺序不阻塞)
    async function sendAudioChunk(chunkBase64) {
        if (!socket || socket.readyState !== WebSocket.OPEN) return;
        const frame = {
            data: chunkBase64,
            status: 0,  // 0表示中间帧，1表示最后结束帧在close时发送
            format: "audio/L16;rate=16000",
            encoding: "raw",
            language: "zh_cn",
            accent: "mandarin",
            domain: "iat",
            vad: "yes",
            ptt: "0",
            nbest: "1",
            wbest: "1",
            speex_size: "0"
        };
        socket.send(JSON.stringify(frame));
    }
    
    async function processAudioQueue() {
        if (sendingAudio) return;
        sendingAudio = true;
        while (audioBufferQueue.length > 0 && socket && socket.readyState === WebSocket.OPEN && isRecording) {
            const chunkBase64 = audioBufferQueue.shift();
            if (chunkBase64) {
                await sendAudioChunk(chunkBase64);
                // 避免过高速发送被限制
                await new Promise(r => setTimeout(r, 20));
            }
        }
        sendingAudio = false;
    }
    
    // 将Float32 PCM音频数据转为16位整数 (pcm s16le) 并Base64编码
    function float32ToInt16PcmBase64(float32Array) {
        const int16Array = new Int16Array(float32Array.length);
        for (let i = 0; i < float32Array.length; i++) {
            let s = Math.max(-1, Math.min(1, float32Array[i]));
            int16Array[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        const buffer = new Uint8Array(int16Array.buffer);
        // 转为 base64 (binary)
        let binary = '';
        for (let i = 0; i < buffer.byteLength; i++) {
            binary += String.fromCharCode(buffer[i]);
        }
        return btoa(binary);
    }
    
    // 启动讯飞识别 + 录音
    async function startVoiceRecognition() {
        if (isRecording) {
            statusMessageSpan.innerText = '识别进行中，请稍后再试';
            return;
        }
        // 检查凭证
        if (APP_ID === 'YOUR_APP_ID' || API_KEY === 'YOUR_API_KEY' || API_SECRET === 'YOUR_API_SECRET') {
            updateUIStatus(false, '请先在代码中填写正确的 APPID、APIKey 和 APISecret', true);
            alert('请先在代码顶部填写讯飞开放平台的 API 凭证 (APP_ID, API_KEY, API_SECRET)');
            return;
        }
        // 重置文本 (开始新识别，保留之前不清除自动创建议log，但清原finalTranscript比较友好)
        finalTranscript = '';
        updateTranscriptUI('', true);
        
        try {
            // 获取麦克风权限
            const stream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: SAMPLE_RATE, channelCount: CHANNELS } });
            mediaStream = stream;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            sourceNode = audioContext.createMediaStreamSource(stream);
            processorNode = audioContext.createScriptProcessor(BUFFER_SIZE * 2, 1, 1);
            
            sourceNode.connect(processorNode);
            processorNode.connect(audioContext.destination);
            
            // 生成签名WebSocket Url
            const wsUrl = await buildWebSocketUrl();
            socket = new WebSocket(wsUrl);
            socket.binaryType = 'arraybuffer';
            
            socket.onopen = () => {
                isRecording = true;
                voiceBtn.disabled = true;
                btnTextSpan.innerText = '识别中...';
                updateUIStatus(true, '✔️ 连接成功，请对着麦克风说话');
                // 发送开始参数 (对于流式听写第一次发送参数帧)
                const startFrame = {
                    common: { app_id: APP_ID },
                    business: { language: "zh_cn", domain: "iat", accent: "mandarin", vad: "yes", dwa: "wpgs", ptt: 0, nbest: 1, wbest: 1 },
                    data: { status: 0, format: "audio/L16;rate=16000", encoding: "raw" }
                };
                socket.send(JSON.stringify(startFrame));
                audioBufferQueue = [];
                sendingAudio = false;
            };
            
            // 接收识别结果
            socket.onmessage = (ev) => {
                try {
                    const json = JSON.parse(ev.data);
                    if (json.code !== 0) {
                        console.warn('讯飞返回错误码:', json.code, json.message);
                        statusMessageSpan.innerText = `识别错误码: ${json.code}`;
                        return;
                    }
                    if (json.data && json.data.result && json.data.result.text) {
                        let recognized = json.data.result.text;
                        if (recognized && recognized !== '') {
                            finalTranscript = recognized;
                            updateTranscriptUI(finalTranscript, false);
                        }
                    }
                } catch(e) {}
            };
            
            socket.onerror = (err) => {
                console.error('WebSocket错误', err);
                statusMessageSpan.innerText = 'WebSocket连接失败，请检查网络/签名/IP绑定';
                closeEverything().then(() => {
                    updateUIStatus(false, '连接出错，请稍后重试', true);
                    voiceBtn.disabled = false;
                    btnTextSpan.innerText = '开始语音输入';
                });
            };
            
            socket.onclose = () => {
                if (isRecording) {
                    closeEverything();
                }
            };
            
            // 音频采集回调
            processorNode.onaudioprocess = (event) => {
                if (!isRecording || !socket || socket.readyState !== WebSocket.OPEN) return;
                const inputData = event.inputBuffer.getChannelData(0);
                // 每次采集固定 BUFFER_SIZE 长度
                const pcmBase64 = float32ToInt16PcmBase64(inputData);
                audioBufferQueue.push(pcmBase64);
                processAudioQueue();
            };
            
            await audioContext.resume();
        } catch (err) {
            console.error('启动失败:', err);
            let errorMsg = '麦克风权限未授予或浏览器不支持';
            if (err.name === 'NotAllowedError') errorMsg = '麦克风权限被拒绝，请手动允许麦克风';
            else if (err.name === 'NotFoundError') errorMsg = '未检测到麦克风设备';
            updateUIStatus(false, errorMsg, true);
            closeEverything();
        }
    }
    
    // 手动结束识别
    async function stopRecognition() {
        if (!isRecording) return;
        // 发送结束帧
        if (socket && socket.readyState === WebSocket.OPEN) {
            const endMsg = JSON.stringify({end: true});
            socket.send(endMsg);
        }
        await closeEverything();
        updateUIStatus(false, '识别已结束', false);
        btnTextSpan.innerText = '开始语音输入';
    }
    
    // 按钮点击：开始/结束切换逻辑
    async function onMainClick() {
        if (isRecording) {
            await stopRecognition();
        } else {
            await startVoiceRecognition();
        }
    }
    
    // 绑定事件
    voiceBtn.addEventListener('click', onMainClick);
    clearBtn.addEventListener('click', clearTranscript);
    
    // 页面关闭时清理资源
    window.addEventListener('beforeunload', () => {
        if (socket && isRecording) {
            closeEverything();
        }
    });
    
    // 初始就绪
    updateUIStatus(false, '就绪，点击🎤并允许麦克风即可说话', false);
</script>
</body>
</html>
