<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Vue2 语音助手 · 实时语音转文字</title>
    <!-- 引入 Vue2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #f6f9fc 0%, #eef2f7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Helvetica, sans-serif;
            padding: 1.5rem;
        }

        /* 主卡片 */
        .card {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 3rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 2px 5px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .card-inner {
            padding: 2rem 2rem 2.5rem;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1F2B3C, #1e3a5f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .header h1::before {
            content: "🎙️";
            font-size: 1.8rem;
            background: none;
            color: #2c5f8a;
        }

        .sub {
            color: #5b6f82;
            margin-top: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            border-top: 1px solid #e2edf2;
            display: inline-block;
            padding-top: 8px;
        }

        /* 结果显示区 */
        .result-container {
            background: #f8fafd;
            border-radius: 2rem;
            margin: 1.5rem 0 1.8rem 0;
            border: 1px solid #e9edf2;
            transition: all 0.2s;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02), 0 1px 2px rgba(0,0,0,0.02);
        }

        .result-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem 0.2rem 1.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6c86a3;
        }

        .result-label span:first-child {
            background: #eef2f7;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
        }

        .result-text {
            padding: 0.25rem 1.5rem 1.5rem 1.5rem;
            min-height: 180px;
            max-height: 320px;
            overflow-y: auto;
        }

        .result-text p {
            font-size: 1.35rem;
            line-height: 1.5;
            font-weight: 500;
            color: #1a2c3e;
            word-break: break-word;
            white-space: pre-wrap;
            font-family: inherit;
        }

        .placeholder-text {
            opacity: 0.5;
            font-weight: 400;
            font-size: 1.1rem;
            color: #7c8f9e;
        }

        /* 状态栏 */
        .status-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            background: #f1f5f9;
            border-radius: 3rem;
            padding: 0.6rem 1.2rem;
            margin: 1rem 0 1.8rem;
            font-size: 0.85rem;
            gap: 12px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            color: #2c3e50;
        }

        .status-led {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background-color: #94a3b8;
            transition: all 0.2s ease;
            box-shadow: 0 0 2px rgba(0,0,0,0.1);
        }

        .status-led.active {
            background-color: #3b82f6;
            box-shadow: 0 0 6px #3b82f6;
            animation: pulse 1.2s infinite;
        }

        .status-led.error-led {
            background-color: #ef4444;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .status-message {
            color: #4b5563;
            flex: 1;
            text-align: right;
            font-size: 0.85rem;
        }

        /* 按钮区域 */
        .button-wrapper {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .voice-btn {
            background: linear-gradient(105deg, #1e3c5c, #112a44);
            border: none;
            padding: 1rem 2rem;
            border-radius: 60px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 10px 18px -8px rgba(0, 32, 64, 0.4);
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .voice-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            background: linear-gradient(105deg, #255c85, #153e60);
            box-shadow: 0 18px 28px -12px rgba(0, 0, 0, 0.35);
        }

        .voice-btn:active:not(:disabled) {
            transform: translateY(2px);
            transition: 0.05s;
        }

        .voice-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            filter: grayscale(0.05);
            transform: none;
            background: linear-gradient(105deg, #5c6f82, #3e5468);
        }

        .voice-icon {
            font-size: 1.6rem;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.2));
        }

        .clear-btn {
            background: rgba(100, 116, 139, 0.1);
            border: none;
            font-size: 0.85rem;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
            padding: 8px 18px;
            border-radius: 40px;
            transition: all 0.2s;
            backdrop-filter: blur(2px);
        }

        .clear-btn:hover {
            background: #e2e8f0;
            color: #0f172a;
        }

        /* 提示辅助信息 */
        .info-tips {
            margin-top: 2rem;
            font-size: 0.75rem;
            text-align: center;
            color: #7d8f9e;
            border-top: 1px solid #e2edf2;
            padding-top: 1.2rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .info-tips span {
            background: #eef3f9;
            padding: 5px 12px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* 移动端适配 */
        @media (max-width: 550px) {
            .card-inner {
                padding: 1.5rem;
            }
            .result-text p {
                font-size: 1.1rem;
            }
            .voice-btn {
                padding: 0.8rem 1.4rem;
                font-size: 1rem;
            }
            .voice-icon {
                font-size: 1.4rem;
            }
            .status-area {
                flex-direction: column;
                align-items: flex-start;
            }
            .status-message {
                text-align: left;
            }
            .button-wrapper {
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="card">
            <div class="card-inner">
                <div class="header">
                    <h1>语音输入</h1>
                    <div class="sub">点击按钮 · 实时转文字</div>
                </div>

                <!-- 识别结果展示区 -->
                <div class="result-container">
                    <div class="result-label">
                        <span>📄 实时转录结果</span>
                        <button class="clear-btn" @click="clearText" aria-label="清空文本">✕ 清空文本</button>
                    </div>
                    <div class="result-text">
                        <p :class="{ 'placeholder-text': !transcript || transcript === '' }">
                            {{ transcript || '✨ 点击下方麦克风按钮，开始语音输入...' }}
                        </p>
                    </div>
                </div>

                <!-- 状态区域 -->
                <div class="status-area">
                    <div class="status-badge">
                        <div class="status-led" :class="{ 'active': isListening, 'error-led': statusError }"></div>
                        <span>{{ statusLabel }}</span>
                    </div>
                    <div class="status-message">{{ statusMessage }}</div>
                </div>

                <!-- 主按钮 + 辅助操作 -->
                <div class="button-wrapper">
                    <button class="voice-btn" @click="toggleListening" :disabled="isRequestingPerm">
                        <span class="voice-icon">{{ isListening ? '⏹️' : '🎤' }}</span>
                        <span>{{ buttonText }}</span>
                    </button>
                </div>

                <div class="info-tips">
                    <span>🔊 中文/英文混合识别</span>
                    <span>🎙️ 自动检测语音结束</span>
                    <span>⚡ 需授予麦克风权限</span>
                    <span>📱 全平台兼容（含安卓/iOS/Windows）</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Vue2 应用
        new Vue({
            el: '#app',
            data: {
                transcript: '',               // 最终显示的文本
                isListening: false,           // 是否正在识别中
                isRequestingPerm: false,      // 是否正在请求权限
                statusError: false,           // 状态是否为错误样式
                statusLabel: '就绪',
                statusMessage: '就绪，点击麦克风并允许权限',
                // 内部识别相关
                recognitionInstance: null,     // 当前 SpeechRecognition 实例
                // 临时累加（用于实时展示优化，但主要用 transcript 展示）
                interimBuffer: '',
                finalBuffer: '',
            },
            computed: {
                buttonText() {
                    if (this.isRequestingPerm) return '请求权限中...';
                    if (this.isListening) return '停止识别';
                    return '开始语音输入';
                }
            },
            mounted() {
                // 检查浏览器支持情况
                this.checkSupport();
            },
            beforeDestroy() {
                // 组件销毁前停止识别
                this.abortRecognition();
            },
            methods: {
                // 检查浏览器是否支持 Web Speech API 和 getUserMedia
                checkSupport() {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (!SpeechRecognition) {
                        this.statusError = true;
                        this.statusLabel = '不支持';
                        this.statusMessage = '当前浏览器不支持语音识别，请使用 Chrome/Edge/Safari 等现代浏览器';
                        this.transcript = '⚠️ 浏览器不支持 Web Speech API，无法使用语音转文字。';
                        return false;
                    }
                    // 检测 getUserMedia（用于预授权）
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        this.statusMessage = '当前环境不支持麦克风权限请求，语音可能无法使用（请升级浏览器）';
                        console.warn('getUserMedia 不可用');
                    }
                    return true;
                },

                // 预请求麦克风权限 (核心解决 not-allowed 问题)
                async requestMicrophonePermission() {
                    // 如果没有 getUserMedia，直接返回成功（让原生的 SpeechRecognition 尝试，可能会有风险但尽力兼容）
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        console.warn('getUserMedia 不可用，跳过预授权，将尝试直接启动识别');
                        return Promise.resolve();
                    }
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        // 获取到流后立即关闭所有音轨，仅用于激活麦克风权限
                        stream.getTracks().forEach(track => track.stop());
                        return Promise.resolve();
                    } catch (err) {
                        let errorMsg = '';
                        if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                            errorMsg = '麦克风权限被拒绝，请手动允许麦克风访问后重试。';
                        } else if (err.name === 'NotFoundError') {
                            errorMsg = '未检测到麦克风设备，请插入麦克风并刷新页面。';
                        } else {
                            errorMsg = `无法获取麦克风权限: ${err.message || '未知错误'}`;
                        }
                        return Promise.reject(errorMsg);
                    }
                },

                // 停止当前识别（主动或内部清理）
                stopRecognition(resetUI = true) {
                    if (this.recognitionInstance) {
                        try {
                            this.recognitionInstance.abort();
                            this.recognitionInstance.stop?.();
                        } catch (e) {
                            // 忽略中止错误
                        }
                        this.recognitionInstance = null;
                    }
                    if (resetUI && this.isListening) {
                        this.isListening = false;
                        this.statusError = false;
                        this.statusLabel = '就绪';
                        this.statusMessage = '语音识别已停止';
                        // 如果有临时未提交的最终文本，确保展示最终内容
                        if (this.finalBuffer) {
                            this.transcript = this.finalBuffer;
                        } else if (this.interimBuffer && !this.finalBuffer) {
                            // 保留临时内容作为最后结果（兜底）
                            this.transcript = this.interimBuffer;
                        }
                    }
                    this.interimBuffer = '';
                    // 不清除 finalBuffer，保留最后一次识别的内容
                },

                // 完全中止识别并清空实例
                abortRecognition() {
                    if (this.recognitionInstance) {
                        try {
                            this.recognitionInstance.abort();
                        } catch(e) {}
                        this.recognitionInstance = null;
                    }
                    this.isListening = false;
                },

                // 核心: 启动语音识别引擎 (前提：已经获得麦克风权限)
                startVoiceEngine() {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (!SpeechRecognition) {
                        this.statusError = true;
                        this.statusMessage = '浏览器不支持语音识别API';
                        return false;
                    }

                    // 创建新实例
                    let recognition;
                    try {
                        recognition = new SpeechRecognition();
                    } catch(err) {
                        this.statusError = true;
                        this.statusMessage = '创建语音识别对象失败: ' + err.message;
                        return false;
                    }

                    // 配置参数：中文优先，实时返回识别
                    recognition.lang = 'zh-CN';
                    recognition.continuous = false;      // 单次识别，语音结束后自动停止
                    recognition.interimResults = true;    // 启用临时结果，实现实时效果
                    recognition.maxAlternatives = 1;

                    // 事件绑定 （注意：为了正确更新 Vue data，使用箭头函数或在外部保存 this）
                    const vm = this;
                    
                    recognition.onstart = function() {
                        vm.isListening = true;
                        vm.recognitionInstance = recognition;
                        vm.statusError = false;
                        vm.statusLabel = '识别中';
                        vm.statusMessage = '🎙️ 正在聆听，请说话... 说完自动停止';
                        // 不清空当前 transcript，但准备接收新内容（新语音会覆盖原有内容）
                        // 为了更好的体验：开始说话时先清除之前的临时buffer，但仍然保留之前完整文本，等到产生新的final再覆盖
                        vm.interimBuffer = '';
                        vm.finalBuffer = '';
                    };
                    
                    recognition.onresult = function(event) {
                        let interimTranscript = '';
                        let finalTranscript = '';
                        // 遍历所有结果
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            const result = event.results[i];
                            const chunk = result[0].transcript;
                            if (result.isFinal) {
                                finalTranscript += chunk;
                            } else {
                                interimTranscript += chunk;
                            }
                        }
                        
                        // 实时更新显示
                        if (finalTranscript) {
                            vm.finalBuffer = finalTranscript;
                            // 覆盖显示最终部分+临时（如果有临时追加）
                            let displayText = finalTranscript;
                            if (interimTranscript) {
                                displayText = finalTranscript + interimTranscript;
                            }
                            vm.transcript = displayText;
                            vm.interimBuffer = interimTranscript;
                        } else if (interimTranscript) {
                            // 仅有临时结果
                            vm.interimBuffer = interimTranscript;
                            let baseText = vm.finalBuffer ? vm.finalBuffer : '';
                            vm.transcript = baseText + interimTranscript;
                        }
                        
                        // 实时更新状态栏信息
                        if (interimTranscript && !finalTranscript) {
                            const shortPreview = interimTranscript.length > 28 ? interimTranscript.substring(0,28)+'…' : interimTranscript;
                            vm.statusMessage = `📝 实时: "${shortPreview}"`;
                        } else if (finalTranscript) {
                            vm.statusMessage = '✅ 已识别最终结果，等待语音结束';
                        }
                    };
                    
                    recognition.onspeechend = function() {
                        // 语音输入结束，引擎即将停止
                        if (vm.isListening && vm.recognitionInstance === recognition) {
                            vm.statusMessage = '语音已结束，正在生成最终文字...';
                        }
                        // 无需额外操作，等待 onend
                    };
                    
                    recognition.onend = function() {
                        // 识别结束 (无论是自动停止还是手动)
                        if (vm.recognitionInstance === recognition) {
                            vm.recognitionInstance = null;
                        }
                        // 最终文本确认
                        if (vm.finalBuffer && vm.finalBuffer.trim() !== '') {
                            vm.transcript = vm.finalBuffer;
                        } else if (vm.interimBuffer && vm.interimBuffer.trim() !== '') {
                            // 如果只有临时结果，也将其作为最终（较好容错）
                            vm.transcript = vm.interimBuffer;
                            vm.finalBuffer = vm.interimBuffer;
                        } else if (!vm.finalBuffer && !vm.interimBuffer && vm.transcript === '') {
                            // 无任何结果且原本为空，给出提示
                            vm.transcript = '⚠️ 未检测到有效语音，请重试并确保麦克风正常';
                        }
                        
                        // 清空临时缓存
                        vm.interimBuffer = '';
                        // 重置UI状态
                        vm.isListening = false;
                        vm.statusError = false;
                        vm.statusLabel = '就绪';
                        vm.statusMessage = '✅ 识别完成，文字已更新';
                        // 按钮恢复
                    };
                    
                    recognition.onerror = function(event) {
                        console.error('语音识别错误:', event.error);
                        let errorMsg = '';
                        switch(event.error) {
                            case 'not-allowed':
                                errorMsg = '麦克风权限被拒绝，请在浏览器设置中允许麦克风。';
                                break;
                            case 'audio-capture':
                                errorMsg = '未找到麦克风设备，请检查麦克风。';
                                break;
                            case 'no-speech':
                                errorMsg = '未检测到语音，请调整麦克风并重新说话。';
                                break;
                            case 'network':
                                errorMsg = '网络问题导致识别失败，请检查网络。';
                                break;
                            case 'aborted':
                                errorMsg = '识别已主动中止';
                                break;
                            default:
                                errorMsg = `识别出错: ${event.error}`;
                        }
                        
                        if (event.error !== 'aborted') {
                            vm.statusError = true;
                            vm.statusLabel = '异常';
                            vm.statusMessage = errorMsg;
                            if (!vm.transcript || vm.transcript.includes('✨')) {
                                vm.transcript = `🎙️ 语音识别失败：${errorMsg}`;
                            }
                        } else {
                            // 主动中止: 静默处理
                            vm.statusMessage = '识别已停止';
                        }
                        
                        // 清理标志
                        if (vm.recognitionInstance === recognition) {
                            vm.recognitionInstance = null;
                        }
                        vm.isListening = false;
                        vm.statusLabel = vm.statusError ? '异常' : '就绪';
                    };
                    
                    // 尝试启动
                    try {
                        recognition.start();
                        return true;
                    } catch (err) {
                        this.statusError = true;
                        this.statusMessage = '启动识别失败: ' + err.message;
                        this.isListening = false;
                        this.recognitionInstance = null;
                        return false;
                    }
                },
                
                // 主要交互：开始/停止 的切换（带预授权）
                async toggleListening() {
                    // 如果正在请求权限，忽略点击
                    if (this.isRequestingPerm) return;
                    
                    // 情况1：正在识别，则停止识别
                    if (this.isListening) {
                        this.stopRecognition(true);
                        return;
                    }
                    
                    // 情况2：未识别，执行“开始”流程：先预请求麦克风权限，再启动引擎
                    // 先进行浏览器支持检查
                    if (!this.checkSupport()) {
                        return;
                    }
                    
                    // 开始请求权限过程
                    this.isRequestingPerm = true;
                    this.statusError = false;
                    this.statusLabel = '授权中';
                    this.statusMessage = '正在申请麦克风权限，请允许...';
                    
                    try {
                        // 预请求麦克风权限 (关键: 解决安卓/Windows not-allowed)
                        await this.requestMicrophonePermission();
                        // 权限取得，启动语音识别引擎
                        this.statusMessage = '权限已获得，正在启动语音识别...';
                        const started = this.startVoiceEngine();
                        if (!started) {
                            // 启动引擎失败时清除请求标志，同时停止loading状态
                            this.isRequestingPerm = false;
                            // 如果启动失败，状态已经通过startVoiceEngine内部设置
                        } else {
                            // 启动成功，请求标志位改为false，剩余由onstart/onend接管
                            this.isRequestingPerm = false;
                        }
                    } catch (permError) {
                        // 权限请求失败 (用户拒绝或硬件问题)
                        this.isRequestingPerm = false;
                        this.statusError = true;
                        this.statusLabel = '无权限';
                        this.statusMessage = permError;
                        // 如果之前没有文字记录，设置提示
                        if (!this.transcript || this.transcript === '✨ 点击下方麦克风按钮，开始语音输入...') {
                            this.transcript = '🎤 无法获取麦克风权限，请在浏览器设置中允许麦克风。';
                        }
                        console.error('预授权错误:', permError);
                    }
                },
                
                // 清空文本
                clearText() {
                    this.transcript = '';
                    this.finalBuffer = '';
                    this.interimBuffer = '';
                    if (!this.isListening) {
                        this.statusMessage = '文本已清空，可开始新的语音输入';
                        // 重置占位提示
                        if (!this.transcript) {
                            // 保持空白
                        }
                    } else {
                        // 识别中清空仅清显示，不影响后台识别时的最终结果（结果仍会覆盖）
                        this.statusMessage = '已清空显示，识别结果将更新此区域';
                    }
                    // 若处于空闲且结果为空，提示轻触开始
                    if (!this.isListening && !this.transcript) {
                        // 无额外动作
                    }
                }
            }
        })
    </script>
