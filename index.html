<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>语音输入助手 · 实时语音转文字</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #f6f9fc 0%, #eef2f7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Helvetica, sans-serif;
            padding: 1.5rem;
        }

        /* 主卡片 */
        .card {
            max-width: 780px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 2px 5px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .card-inner {
            padding: 2rem 2rem 2.5rem;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1F2B3C, #1e3a5f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .header h1::before {
            content: "🎙️";
            font-size: 1.8rem;
            background: none;
            color: #2c5f8a;
        }

        .sub {
            color: #5b6f82;
            margin-top: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            border-top: 1px solid #e2edf2;
            display: inline-block;
            padding-top: 8px;
        }

        /* 结果显示区 */
        .result-container {
            background: #f8fafd;
            border-radius: 2rem;
            margin: 1.5rem 0 1.8rem 0;
            border: 1px solid #e9edf2;
            transition: all 0.2s;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02), 0 1px 2px rgba(0,0,0,0.02);
        }

        .result-label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 1rem 1.5rem 0.2rem 1.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6c86a3;
        }

        .result-label span:first-child {
            background: #eef2f7;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
        }

        .result-text {
            padding: 0.25rem 1.5rem 1.5rem 1.5rem;
            min-height: 180px;
        }

        .result-text p {
            font-size: 1.35rem;
            line-height: 1.5;
            font-weight: 500;
            color: #1a2c3e;
            word-break: break-word;
            white-space: pre-wrap;
            font-family: inherit;
        }

        .placeholder-text {
            opacity: 0.5;
            font-weight: 400;
            font-size: 1.1rem;
            color: #7c8f9e;
        }

        /* 状态栏 */
        .status-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            background: #f1f5f9;
            border-radius: 3rem;
            padding: 0.6rem 1.2rem;
            margin: 1rem 0 1.8rem;
            font-size: 0.85rem;
            gap: 12px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            color: #2c3e50;
        }

        .status-led {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background-color: #94a3b8;
            transition: all 0.2s ease;
            box-shadow: 0 0 2px rgba(0,0,0,0.1);
        }

        .status-led.active {
            background-color: #3b82f6;
            box-shadow: 0 0 6px #3b82f6;
            animation: pulse 1.2s infinite;
        }

        .status-led.error-led {
            background-color: #ef4444;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .status-message {
            color: #4b5563;
            flex: 1;
            text-align: right;
        }

        /* 按钮区域 */
        .button-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 0.5rem;
        }

        .voice-btn {
            background: linear-gradient(105deg, #1e3c5c, #112a44);
            border: none;
            padding: 1rem 2.2rem;
            border-radius: 60px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 10px 18px -8px rgba(0, 32, 64, 0.4);
            backdrop-filter: blur(2px);
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .voice-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            background: linear-gradient(105deg, #255c85, #153e60);
            box-shadow: 0 18px 28px -12px rgba(0, 0, 0, 0.35);
        }

        .voice-btn:active:not(:disabled) {
            transform: translateY(2px);
            transition: 0.05s;
        }

        .voice-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            filter: grayscale(0.05);
            transform: none;
            background: linear-gradient(105deg, #5c6f82, #3e5468);
        }

        .voice-icon {
            font-size: 1.6rem;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.2));
        }

        /* 提示辅助信息 */
        .info-tips {
            margin-top: 2rem;
            font-size: 0.75rem;
            text-align: center;
            color: #7d8f9e;
            border-top: 1px solid #e2edf2;
            padding-top: 1.2rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .info-tips span {
            background: #eef3f9;
            padding: 5px 12px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* 清空微按钮 */
        .clear-btn {
            background: transparent;
            border: none;
            font-size: 0.8rem;
            color: #5f7f9e;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .clear-btn:hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        /* 移动端适配 */
        @media (max-width: 550px) {
            .card-inner {
                padding: 1.5rem;
            }
            .result-text p {
                font-size: 1.1rem;
            }
            .voice-btn {
                padding: 0.8rem 1.6rem;
                font-size: 1rem;
            }
            .voice-icon {
                font-size: 1.4rem;
            }
            .status-area {
                flex-direction: column;
                align-items: flex-start;
            }
            .status-message {
                text-align: left;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-inner">
        <div class="header">
            <h1>语音输入</h1>
            <div class="sub">点击按钮 · 开口即转文字</div>
        </div>

        <!-- 识别结果展示区 -->
        <div class="result-container">
            <div class="result-label">
                <span>📄 实时转录结果</span>
                <button class="clear-btn" id="clearTextBtn" aria-label="清空文本">✕ 清空</button>
            </div>
            <div class="result-text" id="resultDisplay">
                <p id="transcriptParagraph" class="placeholder-text">✨ 点击下方麦克风按钮，开始语音输入...</p>
            </div>
        </div>

        <!-- 状态区域 -->
        <div class="status-area">
            <div class="status-badge">
                <div class="status-led" id="statusLed"></div>
                <span id="statusLabel">就绪</span>
            </div>
            <div class="status-message" id="statusMessage">
                准备就绪，点击按钮并允许麦克风
            </div>
        </div>

        <!-- 主按钮 -->
        <div class="button-wrapper">
            <button class="voice-btn" id="voiceInputBtn">
                <span class="voice-icon">🎤</span>
                <span id="btnText">开始语音输入</span>
            </button>
        </div>

        <div class="info-tips">
            <span>🔊 支持中文/英文混合识别</span>
            <span>🎙️ 自动检测语音结束</span>
            <span>⚡ 需授予麦克风权限</span>
        </div>
    </div>
</div>

<script>
    (function(){
        // 浏览器兼容性：优先使用标准 SpeechRecognition，备选 webkit
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        // DOM 元素
        const voiceBtn = document.getElementById('voiceInputBtn');
        const btnTextSpan = document.getElementById('btnText');
        const transcriptParagraph = document.getElementById('transcriptParagraph');
        const statusLed = document.getElementById('statusLed');
        const statusLabelSpan = document.getElementById('statusLabel');
        const statusMessageSpan = document.getElementById('statusMessage');
        const clearBtn = document.getElementById('clearTextBtn');

        // 状态标志
        let isListening = false;          // 是否正在进行语音识别
        let recognitionInstance = null;   // 当前识别实例
        let lastFinalTranscript = '';     // 保留最后一次最终识别的完整文本 (用于展示)
        
        // 辅助函数: 更新界面文本 (主要结果区)
        function updateTranscriptUI(text, isTemporary = false) {
            if (!transcriptParagraph) return;
            if (!text || text.trim() === '') {
                // 如果无内容且没有临时文本 (避免覆盖占位符文字)
                if (!isTemporary && lastFinalTranscript === '') {
                    transcriptParagraph.innerHTML = '✨ 点击下方麦克风按钮，开始语音输入...';
                    transcriptParagraph.classList.add('placeholder-text');
                } else if (text === '' && !isTemporary) {
                    // 清空情况处理
                    transcriptParagraph.innerHTML = '✨ 暂无识别内容，点击麦克风说话';
                    transcriptParagraph.classList.add('placeholder-text');
                } else if (text !== '') {
                    transcriptParagraph.innerHTML = escapeHtml(text);
                    transcriptParagraph.classList.remove('placeholder-text');
                }
                return;
            }
            // 有真实文本: 移除占位样式并展示
            transcriptParagraph.innerHTML = escapeHtml(text);
            transcriptParagraph.classList.remove('placeholder-text');
        }
        
        // 简单的防XSS辅助
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
        
        // 更新状态栏样式及消息
        function updateStatus(isActive, message, isError = false) {
            if (isActive) {
                statusLed.classList.add('active');
                statusLed.classList.remove('error-led');
                statusLabelSpan.innerText = '识别中';
                statusMessageSpan.innerText = message || '🎙️ 正在聆听，请说话...';
            } else if (isError) {
                statusLed.classList.remove('active');
                statusLed.classList.add('error-led');
                statusLabelSpan.innerText = '异常';
                statusMessageSpan.innerText = message || '出错了，请重试';
            } else {
                statusLed.classList.remove('active');
                statusLed.classList.remove('error-led');
                statusLabelSpan.innerText = '就绪';
                statusMessageSpan.innerText = message || '点击按钮开始语音输入';
            }
        }
        
        // 重置识别器状态 (完全清理)
        function resetRecognitionState() {
            if (recognitionInstance) {
                try {
                    // 尝试中止正在进行的识别
                    recognitionInstance.abort();
                } catch(e) { /* 忽略中止错误 */ }
                recognitionInstance = null;
            }
            isListening = false;
            // 恢复按钮状态
            voiceBtn.disabled = false;
            btnTextSpan.innerText = '开始语音输入';
            // 如果当前没有正在进行中, 且最后识别文本为空则不改变结果区占位，但不清除已有结果（保留上次识别结果更合理）
            // 但语音结束不会主动清除结果，为了体验保留显示内容。
        }
        
        // 停止识别并清理资源 (不改变结果显示, 只改变UI状态)
        function stopListening(resetToIdle = true, customMessage = '') {
            if (!isListening && !recognitionInstance) {
                if(resetToIdle) updateStatus(false, customMessage || '已停止', false);
                return;
            }
            if (recognitionInstance) {
                try {
                    recognitionInstance.stop();
                } catch (e) {
                    // 某些情况下stop可能因为状态抛出异常, 忽略
                }
                recognitionInstance = null;
            }
            isListening = false;
            if (resetToIdle) {
                voiceBtn.disabled = false;
                btnTextSpan.innerText = '开始语音输入';
                updateStatus(false, customMessage || '语音识别已结束', false);
            } else {
                voiceBtn.disabled = false;
                btnTextSpan.innerText = '开始语音输入';
            }
        }
        
        // 启动语音识别核心逻辑
        function startVoiceRecognition() {
            // 1. 检测浏览器支持
            if (!SpeechRecognition) {
                updateStatus(false, '❌ 您的浏览器不支持语音识别，请使用Chrome, Edge, Safari 等现代浏览器', true);
                alert('当前浏览器不支持 Web Speech API。请使用 Chrome， Edge 或 Safari (需https环境)');
                return;
            }
            
            // 2. 避免重复启动
            if (isListening) {
                updateStatus(true, '识别进行中，请等待结束或稍后再试', false);
                return;
            }
            
            // 3. 创建新的识别实例
            let recognition;
            try {
                recognition = new SpeechRecognition();
            } catch(err) {
                updateStatus(false, '创建语音识别对象失败', true);
                console.error(err);
                return;
            }
            
            // 配置识别参数 (中文优先 + 流畅体验)
            recognition.lang = navigator.language || 'zh-CN';     // 自动适配系统语言，通常是中文/英文
            // 如果希望强制中文则设置 'zh-CN' ，但使用系统语言更友好，部分设备支持混合
            // 为保证中文识别效果良好，设定为 zh-CN 或 cmn-Hans-CN
            if (navigator.language && navigator.language.startsWith('zh')) {
                recognition.lang = 'zh-CN';
            } else {
                // 仍然是中文优先但也可以，用户可手动调整，但大部分场景保留中文识别度
                recognition.lang = 'zh-CN';
            }
            
            recognition.continuous = false;          // 单次识别，语音结束后自动停止
            recognition.interimResults = true;       // 开启临时结果，实时展示识别文本
            recognition.maxAlternatives = 1;          // 仅获取最佳结果
            
            // 临时变量存储实时累积文本以及最终文本
            let currentInterimText = '';
            let currentFinalText = '';
            let hasReceivedFinal = false;
            
            // 开始识别事件
            recognition.onstart = () => {
                isListening = true;
                recognitionInstance = recognition;
                voiceBtn.disabled = true;
                btnTextSpan.innerText = '聆听中...';
                updateStatus(true, '🎤 正在听您说话... 说完会自动停止', false);
                // 不清空结果区 但可以给个视觉提示同时不清除现有文本以示继续叠加?
                // 根据体验：开始新识别时不清除上次结果，但如果用户希望全新替换可默认行为。
                // 为了保持直观，开始新语音时保留现有显示，识别后最终会替换为最新内容（更合常规）。
                // 但为了不引起困惑，不清除，让新识别结果覆盖即可。
                // 加上一个小提示：临时结果会覆盖显示。
                if (!lastFinalTranscript && transcriptParagraph.innerText.includes('点击下方麦克风按钮')) {
                    // 如果是占位符，稍微轻提示
                } else {
                    // 保留之前文本，后续识别会展示临时结果在视图上（更加流畅）
                }
            };
            
            // 识别结果事件 (实时)
            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';
                
                // 遍历所有结果集
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const result = event.results[i];
                    const transcriptChunk = result[0].transcript;
                    if (result.isFinal) {
                        finalTranscript += transcriptChunk;
                        hasReceivedFinal = true;
                    } else {
                        interimTranscript += transcriptChunk;
                    }
                }
                
                // 更新显示的文本内容: 优先显示最终内容+临时内容（实时）
                let displayText = '';
                if (finalTranscript) {
                    displayText = finalTranscript;
                    currentFinalText = finalTranscript;
                }
                if (interimTranscript) {
                    displayText = finalTranscript ? finalTranscript + interimTranscript : interimTranscript;
                    currentInterimText = interimTranscript;
                } else if (finalTranscript) {
                    displayText = finalTranscript;
                } else if (currentInterimText) {
                    displayText = currentInterimText;
                }
                
                // 实时渲染到结果区 (这会让用户看到正在说的词句)
                if (displayText && displayText.trim() !== '') {
                    updateTranscriptUI(displayText, true);
                    // 如果已经有临时内容，状态提示可以动态变为实时录入的感觉
                    if (!hasReceivedFinal) {
                        statusMessageSpan.innerText = '📝 实时识别中: "' + (displayText.length > 28 ? displayText.substring(0,28)+'…' : displayText) + '"';
                    }
                } else if (interimTranscript === '' && finalTranscript === '' && !hasReceivedFinal) {
                    // 什么也没识别到, 不覆盖原有结果
                }
                
                // 一旦获得最终文本，保存最终版本到lastFinalTranscript，最终结束后可用
                if (finalTranscript) {
                    lastFinalTranscript = finalTranscript;
                }
            };
            
            // 语音结束 (自动停止)
            recognition.onspeechend = () => {
                // 语音停止输入后，识别器会自行触发end事件，因此在此可以给出提示
                if (isListening && recognitionInstance === recognition) {
                    statusMessageSpan.innerText = '语音输入已停止，正在生成最终文字...';
                }
                // 不手动调用stop，让end事件自动结束
            };
            
            // 识别结束事件 (无论成功或自动结束)
            recognition.onend = () => {
                // 确保清理引用并且更新UI
                if (recognitionInstance === recognition) {
                    recognitionInstance = null;
                }
                // 如果已经获得最后一次最终文本，确认显示
                if (lastFinalTranscript && lastFinalTranscript.trim() !== '') {
                    updateTranscriptUI(lastFinalTranscript, false);
                } else if (currentFinalText) {
                    lastFinalTranscript = currentFinalText;
                    updateTranscriptUI(currentFinalText, false);
                } else if (currentInterimText) {
                    // 如果没有最终结果但有临时结果，则展示临时的（作为识别欠佳回退）
                    if (currentInterimText.trim() !== '') {
                        lastFinalTranscript = currentInterimText;
                        updateTranscriptUI(currentInterimText, false);
                    } else {
                        // 没有任何有效文字，保留原有文字不覆盖
                        if (!lastFinalTranscript || lastFinalTranscript === '') {
                            // 提示无语音输入
                            updateTranscriptUI('', false);
                            transcriptParagraph.innerHTML = '⚠️ 未检测到有效语音，请重新点击按钮说话';
                            transcriptParagraph.classList.add('placeholder-text');
                            statusMessageSpan.innerText = '没有识别到文字，请检查麦克风或再说一次';
                        }
                    }
                } else {
                    // 完全没有识别数据
                    if (!lastFinalTranscript || lastFinalTranscript === '') {
                        transcriptParagraph.innerHTML = '💬 没有检测到语音内容，重试一下？';
                        transcriptParagraph.classList.add('placeholder-text');
                        statusMessageSpan.innerText = '未识别到内容，请允许麦克风权限并清晰说话';
                    }
                }
                
                // 重置识别状态
                isListening = false;
                voiceBtn.disabled = false;
                btnTextSpan.innerText = '开始语音输入';
                // 根据是否有错误显示状态
                updateStatus(false, '✅ 识别完成，文字已显示', false);
                recognitionInstance = null;
            };
            
            // 错误处理
            recognition.onerror = (event) => {
                console.error('语音识别错误:', event.error);
                let errorMsg = '';
                switch(event.error) {
                    case 'not-allowed':
                        errorMsg = '麦克风权限被拒绝，请允许麦克风后重试';
                        break;
                    case 'audio-capture':
                        errorMsg = '未找到麦克风设备，请检查麦克风连接';
                        break;
                    case 'no-speech':
                        errorMsg = '未检测到语音，请调整麦克风并说话';
                        break;
                    case 'network':
                        errorMsg = '网络问题导致识别失败，请检查网络';
                        break;
                    case 'aborted':
                        // 主动中止忽略展示友好信息
                        errorMsg = '识别已中止';
                        break;
                    default:
                        errorMsg = `识别出错: ${event.error}`;
                }
                if (event.error !== 'aborted') {
                    updateStatus(true, errorMsg, true);
                    statusMessageSpan.innerText = errorMsg;
                    // 如果出错但已有识别文本，保留部分文字；否则显示占位符
                    if (!lastFinalTranscript && (!currentInterimText)) {
                        transcriptParagraph.innerHTML = '🎙️ 语音识别失败，' + errorMsg;
                        transcriptParagraph.classList.add('placeholder-text');
                    } else {
                        // 保留已有文字不覆盖
                    }
                }
                // 清理状态，保证按钮恢复正常
                if (recognitionInstance === recognition) {
                    recognitionInstance = null;
                }
                isListening = false;
                voiceBtn.disabled = false;
                btnTextSpan.innerText = '开始语音输入';
                // 注意错误后状态变为就绪
                if (event.error !== 'aborted') {
                    setTimeout(() => {
                        if (!isListening) updateStatus(false, '点击按钮重新尝试', false);
                    }, 1500);
                } else {
                    updateStatus(false, '已取消识别', false);
                }
            };
            
            // 启动识别
            try {
                recognition.start();
            } catch (err) {
                console.error('启动失败', err);
                updateStatus(false, '启动失败: ' + err.message, true);
                voiceBtn.disabled = false;
                btnTextSpan.innerText = '开始语音输入';
                isListening = false;
                recognitionInstance = null;
            }
        }
        
        // 清空文本区域
        function clearTranscript() {
            lastFinalTranscript = '';
            updateTranscriptUI('', false);
            transcriptParagraph.innerHTML = '✨ 已清空，点击麦克风重新输入';
            transcriptParagraph.classList.add('placeholder-text');
            statusMessageSpan.innerText = '文字已清空，可进行新的语音输入';
            // 如果正在识别中，不清除识别缓冲区，避免错乱；最好只清显示区域，不影响正在识别的缓存
            // 但为了体验，如果正在识别，我们可以保留显示区原有内容不清，只需重置显示即可；
            if (!isListening) {
                // 空闲状态下完全清空
            } else {
                // 识别中清空不会影响识别结果回写（下次结果会覆盖）
                // 不影响功能
            }
        }
        
        // 按钮点击事件: 启动语音识别
        function onMainButtonClick() {
            if (isListening) {
                // 如果正在识别中, 提示不可重复启动，但可以给个快速反馈
                updateStatus(true, '识别进行中，稍等自动结束', false);
                return;
            }
            startVoiceRecognition();
        }
        
        // 绑定事件
        voiceBtn.addEventListener('click', onMainButtonClick);
        clearBtn.addEventListener('click', clearTranscript);
        
        // 页面关闭前清理 (避免后台收音)
        window.addEventListener('beforeunload', () => {
            if (recognitionInstance && isListening) {
                try {
                    recognitionInstance.abort();
                } catch(e) {}
            }
        });
        
        // 初始状态 设置空闲
        updateStatus(false, '就绪，点击🎤按钮开始语音输入', false);
        // 设置占位文案
        if (transcriptParagraph.innerText.trim() === '') {
            transcriptParagraph.innerHTML = '✨ 点击下方麦克风按钮，开始语音输入...';
            transcriptParagraph.classList.add('placeholder-text');
        }
    })();
</script>
</body>
</html>
